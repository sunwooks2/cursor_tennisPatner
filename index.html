<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테니스 대진표 자동 생성기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>테니스 대진표 자동 생성기</h1>
        <p>인원수, 코트수, 시간만 입력하면 대진표를 자동으로 생성합니다.</p>
      </header>

      <section class="panel">
        <h2>대진 생성 조건</h2>
        <form id="generator-form" class="form-grid">
          <label>
            <span>남성 인원수</span>
            <input type="number" id="maleCount" min="0" value="12" required />
          </label>
          <label>
            <span>여성 인원수</span>
            <input type="number" id="femaleCount" min="0" value="8" required />ㄱㄱㄱㅗ
          </label>
          <label>
            <span>코트 수</span>
            <input type="number" id="courtCount" min="1" value="3" required />
          </label>
          <label>
            <span>시작시간</span>
            <input type="time" id="startTime" value="09:00" required />
          </label>
          <label>
            <span>종료시간</span>
            <input type="time" id="endTime" value="12:00" required />
          </label>
          <label>
            <span>경기시간(분)</span>
            <input type="number" id="matchMinutes" min="10" step="5" value="30" required />
          </label>

          <fieldset class="checkbox-group">
            <legend>경기 유형</legend>
            <label><input type="checkbox" value="MD" checked /> 남자복식 (MD)</label>
            <label><input type="checkbox" value="WD" checked /> 여자복식 (WD)</label>
            <label><input type="checkbox" value="MXD" checked /> 혼합복식 (MXD)</label>
          </fieldset>

          <div class="action-row">
            <button type="submit" class="btn primary">대진 생성</button>
            <button type="button" id="regenBtn" class="btn">대진 다시 생성</button>
            <button type="button" id="shareBtn" class="btn">공유 링크 복사</button>
            <button type="button" id="pdfBtn" class="btn">PDF 다운로드</button>
          </div>
        </form>
      </section>

      <section id="summary" class="panel hidden"></section>

      <section id="results" class="panel hidden">
        <div class="results-header">
          <h2>생성된 대진표</h2>
          <div class="filters">
            <button class="chip active" data-filter="ALL">전체</button>
            <button class="chip" data-filter="MD">남복</button>
            <button class="chip" data-filter="WD">여복</button>
            <button class="chip" data-filter="MXD">혼복</button>
          </div>
        </div>

        <div id="desktopTableWrap" class="desktop-table-wrap"></div>
        <div id="mobileCards" class="mobile-cards"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="match-card">
        <div class="meta-row">
          <span class="time"></span>
          <span class="court"></span>
          <span class="type"></span>
        </div>
        <p class="team"></p>
        <p class="vs">VS</p>
        <p class="team"></p>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
